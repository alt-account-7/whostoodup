# Builds the static site and deploys to Cloudflare Pages on every merge to main.
# Requires secrets: CLOUDFLARE_API_TOKEN (Pages:Edit scope only), CLOUDFLARE_ACCOUNT_ID.
name: Build & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # PIN THESE TO SHAs BEFORE GOING LIVE.
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  build-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        # On first deploy this creates the project; subsequent deploys update it.
        # wrangler pages deploy prints the deployment URL to stdout.
        run: npx wrangler pages deploy dist/ --project-name=whostoodup --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
